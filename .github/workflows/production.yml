name : KeepnAI CI/CD Pipeline

on :
  push :
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs :

  build-and-deploy-docker :
    runs-on : ubuntu-latest
    environment : production
    steps:
      - name : Checkout Code
        uses : actions/checkout@v3

      - name : Login to Docker Hub
        uses : docker/login-action@v3
        with :
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name : Set up Docker Buildx
        uses : docker/setup-buildx-action@v2


      - name : Build and Push Backend Docker Image
        uses : docker/build-push-action@v3
        with :
          context: ./Morlana_backend
          dockerfile: ./Morlana_backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/morlana:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/morlana:latest

  deploy-and-start-azure:
    needs: build-and-deploy-docker
    runs-on: ubuntu-latest
    environment : production
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Docker Registry Credentials
        run: |
          az containerapp registry add \
            --name morlana \
            --resource-group morlana \
            --server docker.io \
            --username ${{ secrets.DOCKER_USERNAME }} \
            --password ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name morlana \
            --resource-group morlana \
            --image ${{ secrets.DOCKER_USERNAME }}/morlana:${{ github.sha }}
