version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./Morlana_backend
      dockerfile: Dockerfile
    container_name: morlana_backend
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      # Add other environment variables as needed, for example:
      # client_id: ${REDDIT_CLIENT_ID}
      # client_secret: ${REDDIT_CLIENT_SECRET}
      # user_agent: ${REDDIT_USER_AGENT}
      # PSQL_HOSTNAME: ${PSQL_HOSTNAME}
      # PSQL_PORT: ${PSQL_PORT}
      # PSQL_DB: ${PSQL_DB}
      # PSQL_USERNAME: ${PSQL_USERNAME}
      # PSQL_PASSWORD: ${PSQL_PASSWORD}
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: uvicorn app:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./Morlana_frontend
      dockerfile: Dockerfile
    container_name: morlana_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/
    ports:
      - "3000:3000"
    restart: unless-stopped
    command: npm start

volumes:
  qdrant_storage:
